<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cat Number Picker</title>
  <style>
    :root {
      --bg-top: #fff8f2;
      --bg-bottom: #ffe4e6;
      --card: rgba(255, 255, 255, 0.78);
      --card-solid: #ffffff;
      --text: #2b1f1f;
      --muted: #7c6262;
      --accent: #f97316;
      --accent-2: #fb7185;
      --border: rgba(120, 53, 15, 0.12);
      --shadow: 0 24px 70px rgba(88, 28, 28, 0.16);
    }

    * { box-sizing: border-box; }
    html { height: 100%; }

    body {
      min-height: 100%;
      margin: 0;
      font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(250, 204, 21, 0.30), transparent 30%),
        radial-gradient(circle at top right, rgba(251, 113, 133, 0.25), transparent 30%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 440px);
      min-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .hero {
      text-align: center;
      padding: 6px 8px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border);
      color: #9a3412;
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(2rem, 9vw, 3.2rem);
      line-height: 0.96;
      letter-spacing: -0.075em;
      text-align: center;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 28ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
      font-weight: 650;
      text-align: center;
    }

    .picker-card {
      position: relative;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 34px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .picker-card::before {
      content: "";
      position: absolute;
      inset: -70px auto auto -65px;
      width: 170px;
      height: 170px;
      background: rgba(251, 113, 133, 0.14);
      border-radius: 999px;
      pointer-events: none;
    }

    .display-panel {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,247,237,0.95));
      border: 1px solid var(--border);
      border-radius: 28px;
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -10px 20px rgba(249, 115, 22, 0.05);
      text-align: center;
      overflow: hidden;
    }

    .number-display {
      font-size: clamp(5.8rem, 28vw, 8.5rem);
      font-weight: 1000;
      letter-spacing: -0.08em;
      color: var(--accent);
      text-shadow: 0 8px 24px rgba(249, 115, 22, 0.22);
      transform: scale(1);
      transition: transform 160ms ease;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-align: center;
      width: 100%;
      padding: 0 12px 24px;
    }

    .number-display.pop {
      transform: scale(1.15) rotate(-2deg);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      text-align: center;
      color: #8a5a12;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .paw-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-top: 20px;
    }

    .paw-button {
      width: min(72vw, 270px);
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.14) 20%, rgba(255,255,255,0) 36%),
        radial-gradient(circle at 54% 62%, rgba(255,255,255,0.09), rgba(255,255,255,0) 58%),
        linear-gradient(145deg, #ff8b72, #fb7185 58%, #f3496d);
      cursor: pointer;
      padding: 0;
      outline: none;
      box-shadow:
        0 24px 46px rgba(244, 63, 94, 0.22),
        inset 0 8px 14px rgba(255,255,255,0.24),
        inset 0 -14px 20px rgba(136, 19, 55, 0.15);
      transition: transform 110ms ease, box-shadow 110ms ease;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .paw-button::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      pointer-events: none;
    }

    .paw-button:active {
      transform: scale(0.95);
      box-shadow:
        0 14px 26px rgba(244, 63, 94, 0.22),
        inset 0 5px 10px rgba(255,255,255,0.18),
        inset 0 -10px 16px rgba(136, 19, 55, 0.18);
    }

    .button-face {
      position: relative;
      z-index: 1;
      width: 64%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.55), rgba(255,255,255,0.16) 28%, rgba(255,255,255,0.04) 54%, rgba(255,255,255,0) 72%),
        rgba(255, 247, 237, 0.18);
      color: rgba(255, 247, 237, 0.96);
      font-size: clamp(2.1rem, 11vw, 3.7rem);
      font-weight: 1000;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      text-shadow: 0 8px 18px rgba(127, 29, 29, 0.18);
      box-shadow:
        inset 0 4px 12px rgba(255,255,255,0.18),
        inset 0 -8px 14px rgba(136, 19, 55, 0.08);
      user-select: none;
    }

    .tap-label {
      color: #7f1d1d;
      font-weight: 950;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .lick-toggle {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .lick-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      letter-spacing: -0.01em;
    }

    .lick-btn.active {
      background: linear-gradient(145deg, #fb7185, #f97316);
      color: #fff7ed;
      border-color: transparent;
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.28);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .control {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      padding: 12px;
    }

    .control label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .control input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 950;
      text-align: center;
    }

    .history-container {
      background: rgba(255,255,255,0.54);
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 14px 42px rgba(88, 28, 28, 0.09);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 1rem;
      font-weight: 1000;
      letter-spacing: -0.03em;
    }

    .clear-button {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: #9a3412;
      font-size: 0.82rem;
      font-weight: 900;
      padding: 9px 12px;
      cursor: pointer;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      min-height: 44px;
      align-items: center;
      justify-content: center;
    }

    .history-item {
      min-width: 42px;
      height: 42px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--card-solid);
      border: 1px solid rgba(249, 115, 22, 0.16);
      color: #c2410c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 1000;
      font-size: 1.02rem;
      box-shadow: 0 8px 18px rgba(154, 52, 18, 0.08);
      animation: rise 180ms ease both;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 650;
      text-align: center;
      width: 100%;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(120px);
      background: rgba(43, 31, 31, 0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 850;
      box-shadow: 0 18px 40px rgba(0,0,0,0.24);
      transition: transform 220ms ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-height: 720px) {
      .app { justify-content: flex-start; }
      .display-panel { min-height: 150px; }
      .paw-button { width: min(58vw, 220px); }
      h1 { font-size: clamp(1.8rem, 8vw, 2.6rem); }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero" aria-label="App intro">
      <div class="badge">🐱 Cat-powered random picker</div>
      <h1>Let Your Cat Pick!</h1>
      <p class="subtitle">Tap the giant button, or let your cat do the honours. Pick a number from your chosen range.</p>
    </section>

    <section class="picker-card" aria-label="Number picker">
      <div class="display-panel">
        <div class="number-display" id="display" aria-live="polite">?</div>
        <div class="hint" id="hint">Ready for a tap</div>
      </div>

      <div class="paw-zone">
        <button class="paw-button" id="pawBtn" aria-label="Pick a random number">
          <span class="button-face">Tap</span>
        </button>
        <div class="tap-label">Tap button to pick</div>
        <div class="lick-toggle">
          <button class="lick-btn" id="lickBtn" aria-pressed="false" aria-label="Toggle lick mode: pick a number by swiping up">
            <span>😽</span>
            <span>Lick Mode</span>
          </button>
        </div>
      </div>

      <div class="controls" aria-label="Number range">
        <div class="control">
          <label for="minNum">Min</label>
          <input id="minNum" type="number" inputmode="numeric" value="1" />
        </div>
        <div class="control">
          <label for="maxNum">Max</label>
          <input id="maxNum" type="number" inputmode="numeric" value="49" />
        </div>
      </div>
    </section>

    <section class="history-container" aria-label="Numbers picked history">
      <div class="history-header">
        <div class="history-title">Numbers Picked</div>
        <button class="clear-button" id="clearBtn">Clear</button>
      </div>
      <div class="history-list" id="history">
        <span class="empty-state">No numbers yet. Let the cat choose first.</span>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">Range fixed</div>

  <script>
    const pawBtn = document.getElementById("pawBtn");
    const clearBtn = document.getElementById("clearBtn");
    const lickBtn = document.getElementById("lickBtn");
    const display = document.getElementById("display");
    const historyList = document.getElementById("history");
    const minInput = document.getElementById("minNum");
    const maxInput = document.getElementById("maxNum");
    const hint = document.getElementById("hint");
    const toast = document.getElementById("toast");

    let history = [];
    let lickMode = false;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 1300);
    }

    function getRange() {
      let min = parseInt(minInput.value, 10);
      let max = parseInt(maxInput.value, 10);

      if (Number.isNaN(min)) min = 1;
      if (Number.isNaN(max)) max = 49;

      if (min > max) {
        const oldMin = min;
        min = max;
        max = oldMin;
        minInput.value = min;
        maxInput.value = max;
        showToast("Swapped min and max");
      }

      return { min, max };
    }

    function renderHistory() {
      historyList.innerHTML = "";

      if (history.length === 0) {
        const empty = document.createElement("span");
        empty.className = "empty-state";
        empty.textContent = "No numbers yet. Let the cat choose first.";
        historyList.appendChild(empty);
        return;
      }

      history.forEach((num) => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.textContent = num;
        historyList.appendChild(item);
      });
    }

    function pickNumber() {
      const { min, max } = getRange();
      const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;

      display.textContent = randomNum;
      display.classList.remove("pop");
      void display.offsetWidth;
      display.classList.add("pop");

      hint.textContent = "The cat has chosen";
      history.push(randomNum);

      if (history.length > 24) {
        history = history.slice(history.length - 24);
      }

      renderHistory();

      if ("vibrate" in navigator) {
        navigator.vibrate(35);
      }
    }

    pawBtn.addEventListener("click", pickNumber);

    lickBtn.addEventListener("click", () => {
      lickMode = !lickMode;
      lickBtn.setAttribute("aria-pressed", lickMode);
      lickBtn.classList.toggle("active", lickMode);
      hint.textContent = lickMode ? "Swipe up to pick!" : "Ready for a tap";
      showToast(lickMode ? "Lick mode on 😽" : "Lick mode off");
    });

    // Swipe-up (touch) detection for lick mode
    let touchStartY = null;
    document.addEventListener("touchstart", (e) => {
      if (!lickMode) return;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (!lickMode || touchStartY === null) return;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (dy > 50) {
        pickNumber();
      }
      touchStartY = null;
    }, { passive: true });

    // Scroll-up (wheel) detection for lick mode — scoped to picker card
    let wheelCooldown = false;
    document.querySelector(".picker-card").addEventListener("wheel", (e) => {
      if (!lickMode || wheelCooldown) return;
      if (e.deltaY < 0) {
        pickNumber();
        wheelCooldown = true;
        window.setTimeout(() => { wheelCooldown = false; }, 800);
      }
    }, { passive: true });

    clearBtn.addEventListener("click", () => {
      history = [];
      display.textContent = "?";
      hint.textContent = "Ready for a tap";
      renderHistory();
      showToast("History cleared");
    });
  </script>
</body>
</html>
